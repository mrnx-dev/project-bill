  db:
    image: postgres:18
    container_name: projectbill_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-projectbill_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-projectbill_password}
      POSTGRES_DB: ${POSTGRES_DB:-projectbill_db}
    # Exposing via 5433 to avoid conflict with xyla_db
    ports:
      - "5433:5432"
    volumes:
      - projectbill_pgdata_v18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-projectbill_user} -d ${POSTGRES_DB:-projectbill_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

